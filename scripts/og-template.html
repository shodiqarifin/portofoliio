<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      background: #0f172a;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
      top: -200px;
      right: -100px;
      pointer-events: none;
    }

    .card {
      position: relative;
      width: 1080px;
      height: 510px;
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 24px;
      padding: 56px 64px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 64px;
      right: 64px;
      height: 2px;
      background: linear-gradient(90deg, #6366f1, #818cf8, transparent);
      border-radius: 0 0 4px 4px;
    }

    .domain {
      font-size: 18px;
      font-weight: 500;
      color: #818cf8;
      letter-spacing: 0.05em;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 12px;
      margin-top: 32px;
    }

    .name {
      font-size: 72px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    .divider {
      width: 56px;
      height: 3px;
      background: linear-gradient(90deg, #6366f1, #818cf8);
      border-radius: 2px;
      margin-top: 4px;
    }

    .subtitle {
      font-size: 28px;
      font-weight: 500;
      color: #94a3b8;
      margin-top: 4px;
    }

    .badges {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .badge {
      background: #1e1b4b;
      color: #818cf8;
      font-size: 15px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 999px;
      border: 1px solid #312e81;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="card">
    <div class="domain">sdqstack.in</div>
    <div class="main">
      <div class="name">Shodiq Arifin</div>
      <div class="divider"></div>
      <div class="subtitle">Software Engineer</div>
    </div>
    <div class="badges">
      <span class="badge">Vue</span>
      <span class="badge">Nuxt</span>
      <span class="badge">Go</span>
      <span class="badge">TypeScript</span>
      <span class="badge">Node.js</span>
    </div>
  </div>
</body>
</html>
